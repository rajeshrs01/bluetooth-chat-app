name: Build APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - run: chmod +x bluetooth-chat-app/gradlew

      - run: cd bluetooth-chat-app && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: bluetooth-chat-app/app/build/outputs/apk/debug/*.apk
