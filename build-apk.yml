name: Build Android APK

on:
  push:
    branches: [ develop, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ develop ]
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout code ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. System deps needed by Buildozer ──────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache

      # ── 4. Cache Buildozer downloads (SDK, NDK, pip) ────────────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements-mobile.txt') }}
          restore-keys: pip-

      # ── 5. Install Python tools ──────────────────────────────────
      - name: Install Buildozer and Kivy
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 kivy==2.2.1 bleak cryptography cython

      # ── 6. Build the APK ────────────────────────────────────────
      - name: Build debug APK
        run: buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: "0"

      # ── 7. Rename APK to include commit SHA ─────────────────────
      - name: Rename APK
        run: |
          mkdir -p artifacts
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          APK=$(ls bin/*.apk | head -1)
          cp "$APK" "artifacts/BlueChat-${{ github.ref_name }}-${SHORT_SHA}.apk"
          echo "APK_PATH=artifacts/BlueChat-${{ github.ref_name }}-${SHORT_SHA}.apk" >> $GITHUB_ENV
          echo "Built: $APK_PATH"

      # ── 8. Upload APK as workflow artifact ──────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlueChat-APK
          path: artifacts/*.apk
          retention-days: 30

      # ── 9. Create GitHub Release (only on version tags) ─────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          body: |
            ## BlueChat ${{ github.ref_name }}

            ### Install on Android
            1. Download the `.apk` file below
            2. Open it on your Android phone
            3. Tap **Install** (enable "Unknown sources" if prompted)

            ### Requirements
            - Android 8.0+ (API 26)
            - Bluetooth enabled
            - Location permission (required for BLE scanning)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Separate job: run Python tests ──────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest pytest-mock cryptography
      - name: Run tests
        run: pytest tests/ -v --tb=short
